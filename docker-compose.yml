services:
  beacon_cast:
    build:
      context: .
      args:
        CARGO_FEATURES: metrics
    ports:
      - "8748:8748"
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ASTER__SERVER__HOST=0.0.0.0
      - ASTER__DATABASE__URL=sqlite:///data/beacon_cast.db?mode=rwc
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8748/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 45s
    restart: unless-stopped
