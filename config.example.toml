# Static service configuration.
#
# Copy this file to data/config.toml for local deployment-specific values. Relative filesystem
# paths and sqlite:// relative database paths are resolved from the config file directory.

[server]
host = "127.0.0.1"
port = 8748
workers = 0
temp_dir = ".tmp"

[database]
url = "sqlite://beacon_cast.db?mode=rwc"
pool_size = 10
retry_count = 3

[auth]
# Replace before deploying. Used to sign admin JWTs.
jwt_secret = "change-me-beacon-cast-development-secret"
# Extra frontend origins allowed to perform cookie-authenticated admin writes.
# Add the Vite dev server origin for local frontend development.
trusted_origins = ["http://127.0.0.1:5173", "http://localhost:5173"]

[cache]
# Supported backends in this template: "memory", "redis".
backend = "memory"
# Redis example: "redis://127.0.0.1:6379/0".
endpoint = ""
default_ttl = 3600

[config_sync]
# Supported backends in this template: "disabled", "redis".
backend = "disabled"
# Redis pubsub example: "redis://127.0.0.1:6379/0".
endpoint = ""
topic = "beacon_cast.config_reload"

[logging]
# level examples: "info", "debug", "warn", "error", "tower_http=debug,beacon_cast=debug".
level = "info"
# format examples: "text", "json".
format = "text"
file = ""
enable_rotation = false
max_backups = 5
