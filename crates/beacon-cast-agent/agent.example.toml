# BeaconCast local agent configuration.
#
# Copy this file to agent.toml and replace the token with a device token created from the admin UI
# or API. Optional overrides must contain public-safe labels only; do not put raw paths, window
# titles, shell commands, browser URLs, or private directory names in labels.

[server]
url = "http://127.0.0.1:8748"
token = "bcast_replace_with_device_token"

[runtime]
# Local fallback interval. The server-owned agent config can override the actual report interval
# after the agent authenticates.
poll_interval_seconds = 30
request_timeout_seconds = 10
# trace, debug, info, warn, or error. RUST_LOG still takes precedence when set.
log_level = "info"

[source]
kind = "frontmost_app"
source_name = "frontmost_app"

[source.default]
confidence = 0.35

[idle_detector]
enabled = true
idle_after_seconds = 600

# Optional app-level overrides. Project facts are better reported by editor/browser plugins.
# [[rules]]
# app = "Code"
# project_key = "beacon_cast"
# project_label = "BeaconCast"
# confidence = 0.92
