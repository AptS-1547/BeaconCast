name: Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY_IMAGE_GHCR: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            features: ""
            suffix: ""
          - variant: metrics
            features: "metrics"
            suffix: "-metrics"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE_GHCR }}
          tags: |
            type=ref,event=tag,suffix=${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }},enable=${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
            type=raw,value=edge${{ matrix.suffix }},enable=${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          labels: |
            org.opencontainers.image.title=beacon_cast
            org.opencontainers.image.description=Production-grade personal activity beacon service
            org.opencontainers.image.vendor=AsterCommunity

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-image-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-image-${{ matrix.variant }}
          build-args: |
            CARGO_FEATURES=${{ matrix.features }}
          provenance: true
          sbom: true
